<div class="payment-form-card">
  <h3>Log Tenant Payment</h3>
  <form id="paymentForm">
    <label for="farmId">Select Farm:</label>
    <select id="farmId" required>
      <option value="farm1">Farm 1 (Nagaraju Edavalli)</option>
      <option value="farm2">Farm 2 (Nagaraju Bejawada)</option>
      <option value="farm3">Farm 3 (Nunakani Krishna Rao)</option>
      <option value="farm4">Farm 4 (Nagaraju Bejawada)</option>
      <option value="farm5">Farm 5 (Nulakani Krishna Alludu)</option>
      <option value="farm6">Farm 6 (Venkateswara Rao Galaigudem)</option>
      <option value="farm7">Farm 7 (Ramakrishna Tekkinavarigudam)</option>
    </select>

    <label for="paidAmount">Amount Paid (₹):</label>
    <input type="number" id="paidAmount" placeholder="e.g. 50000" required>

    <label for="paidDate">Payment Date:</label>
    <input type="date" id="paidDate" required>

    <label for="paidTransaction">Reference / Transaction ID:</label>
    <input type="text" id="paidTransaction" placeholder="e.g. UPI / Bank Transfer Ref No">

    <button type="submit">Record Payment</button>
  </form>
</div>

<script>
  document.getElementById('paymentForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const data = {
      farmId: document.getElementById('farmId').value,
      paidAmount: document.getElementById('paidAmount').value,
      paidDate: document.getElementById('paidDate').value,
      paidTransaction: document.getElementById('paidTransaction').value
    };

    const response = await fetch('/api/update-payment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await response.json();
    if(result.success) {
      alert(result.message);
      window.location.reload(); // Refresh screen to show the newly calculated balance remaining
    } else {
      alert("Error: " + result.error);
    }
  });
</script>
